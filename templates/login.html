{% extends "base.html" %}
{% block title %}Login - LunaBloom{% endblock %}
{% block content %}

<section class="page-header">
    <div class="container">
        <span class="section-badge">🔑 Welcome Back</span>
        <h1>Login to <span class="text-accent">LunaBloom</span></h1>
        <p>Access your account or admin panel</p>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="form-wrapper form-wrapper-sm">
            <form id="loginForm" class="form-card">
                <h2 class="form-title">Sign In</h2>

                <div class="form-group">
                    <label for="loginEmail">Email or Username <span class="required">*</span></label>
                    <input type="text" id="loginEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password <span class="required">*</span></label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>

                <p class="form-footer">Don't have an account? <a href="/register">Register here</a></p>

                <div class="login-hint">
                    <p><strong>Admin:</strong> admin / admin123</p>
                </div>
            </form>
        </div>
    </div>
</section>

{% endblock %}

{% block scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        const data = {
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
        };

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                showToast(result.message, 'success');
                setTimeout(() => window.location.href = result.redirect, 1000);
            } else {
                showToast(result.message, 'error');
            }
        } catch (err) {
            showToast('Something went wrong.', 'error');
        }

        btn.disabled = false;
        btn.textContent = 'Login';
    });
</script>
{% endblock %}
